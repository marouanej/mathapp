<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Escape Math - Hors ligne</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
        background: radial-gradient(
            circle at top,
            #dbeafe 0%,
            #eff6ff 28%,
            #f8fafc 62%
          ),
          linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: #0f172a;
      }

      .card {
        width: min(100%, 420px);
        padding: 20px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #e2e8f0;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 18px;
        background: linear-gradient(135deg, #0ea5e9, #14b8a6);
        color: #fff;
        font-weight: 800;
        font-size: 20px;
      }

      h1 {
        margin: 14px 0 8px;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }

      .actions {
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      a,
      button {
        appearance: none;
        border: none;
        text-decoration: none;
        text-align: center;
        border-radius: 18px;
        padding: 14px 16px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      .primary {
        background: #0f172a;
        color: #fff;
      }

      .secondary {
        background: #eef2ff;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">EM</div>
      <h1>Tu es hors ligne</h1>
      <p>
        Escape Math a conserve les ressources essentielles, mais cette page a
        besoin d’une connexion pour se synchroniser correctement.
      </p>
      <div class="actions">
        <button
          class="primary"
          type="button"
          onclick="window.location.reload()"
        >
          Réessayer
        </button>
        <a class="secondary" href="/signin">Retour à la connexion</a>
      </div>
    </main>
  </body>
</html>
